<div class="config-section-card{{#if collapsed}} collapsed{{/if}}" data-section-id="{{sectionId}}" draggable="true">
    <div class="section-card-header">
        <div class="section-drag-handle">
            {{> icon name="menu-bars" width="14" height="14"}}
        </div>
        <div class="section-info">
            <span class="section-name" data-i18n="{{nameKey}}">{{name}}</span>
            <button class="section-action-btn section-toggle-btn" onclick="toggleSectionCollapse('{{sectionId}}')" data-i18n-title="btn.collapse" title="Collapse">
                {{> icon name="chevron-down" width="14" height="14"}}
            </button>
            <span class="section-field-count"><span data-i18n="section.fields">fields</span>: {{fieldCount}}</span>
        </div>
        <div class="section-actions">
            <button class="section-action-btn section-add-field-btn" onclick="openAddFieldToSectionModal('{{sectionId}}')" data-i18n-title="btn.add_field" title="Add Field">
                {{> icon name="plus-add" width="14" height="14"}}
            </button>
            <button class="section-action-btn section-edit-btn" onclick="editSection('{{sectionId}}')" data-i18n-title="btn.edit" title="Edit">
                {{> icon name="edit-pencil" width="14" height="14"}}
            </button>
            <button class="section-action-btn section-hide-btn" onclick="toggleSectionVisibility('{{sectionId}}')" data-i18n-title="btn.hide_section" title="Hide Section">
                {{> icon name="eye-off" width="14" height="14"}}
            </button>
            <button class="section-action-btn section-delete-btn{{#unless deletable}} disabled{{/unless}}" onclick="{{#if deletable}}deleteSection('{{sectionId}}'){{else}}return false{{/if}}" data-i18n-title="{{#if deletable}}btn.delete{{else}}btn.system_section{{/if}}" {{#if deletable}}title="Delete"{{else}}data-i18n-tooltip="btn.system_section_tooltip" data-tooltip="System section cannot be deleted"{{/if}}{{#unless deletable}} disabled{{/unless}}>
                {{> icon name="x-close" width="14" height="14"}}
            </button>
        </div>
    </div>
    <div class="section-card-body">
        <div class="section-fields-list drop-zone" data-section-id="{{sectionId}}">
            {{> @partial-block }}
        </div>
    </div>
</div>
