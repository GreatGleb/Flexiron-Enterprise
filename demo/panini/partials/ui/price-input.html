<div class="price-input-wrap" id="{{id}}">
    <input type="number" class="glass-input price-value" value="{{value}}" placeholder="{{placeholder}}" step="0.01" min="0">
    <div class="price-unit-select">
        <select class="glass-input unit-select">
            {{#each units}}
            <option value="{{this}}"{{#eq this ../unit}} selected{{/eq}}>{{this}}</option>
            {{/each}}
        </select>
    </div>
</div>
