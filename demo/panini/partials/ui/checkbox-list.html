<div class="checkbox-list{{#if searchable}} searchable{{/if}}" id="{{id}}">
    {{#if showControls}}
    <div class="checkbox-list-controls">
        <button type="button" class="text-btn select-all-btn" data-action="select-all" data-i18n="{{selectLabelKey}}">{{selectLabel}}</button>
        <button type="button" class="text-btn deselect-all-btn" data-action="deselect-all" data-i18n="{{deselectLabelKey}}">{{deselectLabel}}</button>
        <span class="selected-count"><span class="count">0</span> <span data-i18n="{{selectedTextKey}}">{{selectedText}}</span></span>
    </div>
    {{/if}}
    {{#if searchable}}
    <div class="checkbox-list-search">
        {{> icon name="search" width="14" height="14" class="search-icon"}}
        <input type="text" class="glass-input search-input" placeholder="{{searchPlaceholder}}" data-i18n="{{searchPlaceholderKey}}">
    </div>
    {{/if}}
    <div class="checkbox-list-items">
        {{> @partial-block }}
    </div>
</div>
