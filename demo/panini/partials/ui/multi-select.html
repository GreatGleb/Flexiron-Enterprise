<div class="multi-select-wrap custom-select-wrap" id="{{id}}">
    <div class="glass-input custom-select-trigger">
        <div class="multi-select-tags" data-placeholder="{{placeholder}}">
            <span class="multi-select-placeholder" data-i18n="{{placeholderKey}}">{{placeholder}}</span>
        </div>
        {{> icon name="chevron-down" width="12" height="12" class="select-arrow"}}
    </div>
    <div class="custom-select-list multi-select-list">
        {{> @partial-block }}
    </div>
</div>
