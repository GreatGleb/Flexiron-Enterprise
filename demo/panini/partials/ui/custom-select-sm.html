<div class="custom-select-wrap custom-select-sm" id="{{id}}">
    <div class="glass-input custom-select-trigger">
        <span class="curr-val">{{defaultValue}}</span>
        {{> icon name="chevron-down" width="10" height="10" class="select-arrow"}}
    </div>
    <div class="custom-select-list">
        {{> @partial-block }}
    </div>
    <input type="hidden" class="dirty-check" id="{{fieldId}}" value="{{defaultValue}}">
</div>
