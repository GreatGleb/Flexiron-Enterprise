<div class="email-template" id="{{id}}">
    <div class="email-template-subject">
        <label class="field-label" data-i18n="{{subjectLabelKey}}">{{subjectLabel}}</label>
        <input type="text" class="glass-input subject-input" value="{{subject}}" data-i18n-placeholder="{{subjectPlaceholderKey}}">
    </div>
    <div class="email-template-body">
        <label class="field-label" data-i18n="{{bodyLabelKey}}">{{bodyLabel}}</label>
        <textarea class="glass-input body-input" rows="8" placeholder="{{bodyPlaceholder}}" data-i18n="{{bodyPlaceholderKey}}">{{body}}</textarea>
    </div>
    {{> @partial-block }}
</div>
